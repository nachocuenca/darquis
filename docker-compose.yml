services:
  darquis:
    container_name: darquis-web
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:13080:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - GOOGLE_SCRIPT_WEBHOOK_URL=${GOOGLE_SCRIPT_WEBHOOK_URL}
      - GOOGLE_SCRIPT_SECRET=${GOOGLE_SCRIPT_SECRET}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - WAITLIST_NOTIFY_TO=${WAITLIST_NOTIFY_TO}
      - WAITLIST_NOTIFY_FROM=${WAITLIST_NOTIFY_FROM}
      - WAITLIST_SHEET_URL=${WAITLIST_SHEET_URL}
