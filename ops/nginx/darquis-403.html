<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Darquis · Acceso no disponible</title>
    <style>
      /* ── Reset ──────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Tokens ─────────────────────────────────────────────── */
      :root {
        --bg:        #f4f8fc;
        --ink:       #0f1a22;
        --blue:      #1fa6ba;
        --blue-dk:   #0b7588;
        --blue-lt:   #e2f5f8;
        --border:    #cfe0e8;
        --muted:     #566874;
        --grid-px:   60px;
        --grid-c:    rgba(31, 166, 186, 0.042);
        --r:         18px;
      }

      /* ── Base ───────────────────────────────────────────────── */
      html { height: 100%; }

      body {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2.5rem 1.25rem;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
                     "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        color: var(--ink);

        /* Grid + ambient light */
        background-color: var(--bg);
        background-image:
          linear-gradient(var(--grid-c) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-c) 1px, transparent 1px),
          radial-gradient(ellipse 80% 55% at 8%  4%,  rgba(140, 180, 255, 0.10) 0%, transparent 100%),
          radial-gradient(ellipse 65% 60% at 94% 96%, rgba(31,  166, 186, 0.11) 0%, transparent 100%),
          linear-gradient(180deg, #f9fcff 0%, var(--bg) 60%, #f0f7fc 100%);
        background-size:
          var(--grid-px) var(--grid-px),
          var(--grid-px) var(--grid-px),
          100% 100%, 100% 100%, 100% 100%;
      }

      /* ── Decorative scene ───────────────────────────────────── */
      .scene {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }

      /* ── Card ───────────────────────────────────────────────── */
      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 436px;
        background: #ffffff;
        /* Gradient top accent border via outline trick */
        border-radius: var(--r);
        /* Layered shadow: ambient + directional */
        box-shadow:
          0  1px  2px  rgba(11, 117, 136, 0.04),
          0  4px  16px rgba(11, 117, 136, 0.09),
          0 24px  64px rgba(11, 117, 136, 0.07);
        /* Fine border */
        outline: 1px solid var(--border);
        /* Gradient top stripe via pseudo */
        overflow: hidden;
        padding: 0;
        text-align: center;
      }

      /* Teal accent stripe at top of card */
      .card::before {
        content: "";
        display: block;
        height: 3px;
        background: linear-gradient(90deg, var(--blue-lt) 0%, var(--blue) 38%, var(--blue-dk) 72%, var(--blue-lt) 100%);
      }

      /* Inner content wrapper for padding */
      .card-inner {
        padding: 2.75rem 2.75rem 2.5rem;
      }

      /* ── Wordmark ─────────────────────────────────────────────── */
      .wordmark {
        display: block;
        font-size: 0.8125rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--blue-dk);
        opacity: 0.72;
        margin-bottom: 2.25rem;
      }

      /* ── Accent rule ─────────────────────────────────────────── */
      .rule {
        display: block;
        width: 32px;
        height: 1.5px;
        margin: 0 auto 1.75rem;
        background: linear-gradient(90deg, transparent, var(--blue) 40%, var(--blue) 60%, transparent);
        border-radius: 2px;
      }

      /* ── Heading ─────────────────────────────────────────────── */
      h1 {
        font-size: 1.4375rem;
        font-weight: 700;
        line-height: 1.2;
        letter-spacing: -0.028em;
        color: var(--ink);
        margin-bottom: 0.875rem;
      }

      /* ── Body text ───────────────────────────────────────────── */
      .body {
        font-size: 0.9375rem;
        line-height: 1.7;
        color: var(--muted);
        margin-bottom: 0;
      }

      /* ── Micro ───────────────────────────────────────────────── */
      .micro {
        margin-top: 1.5rem;
        font-size: 0.8125rem;
        color: var(--muted);
        opacity: 0.55;
      }

      /* ── Responsive ──────────────────────────────────────────── */
      @media (max-width: 480px) {
        .card-inner { padding: 2.25rem 1.625rem 2rem; }
        h1           { font-size: 1.25rem; }
      }

      @media (max-width: 360px) {
        .card-inner { padding: 2rem 1.25rem 1.75rem; }
      }
    </style>
  </head>
  <body>

    <!-- Decorative SVG scene: arcs + blueprint lines -->
    <svg class="scene" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Top-left quadrant arcs -->
      <circle cx="-90" cy="-70" r="420"
              fill="none" stroke="rgba(31,166,186,0.075)" stroke-width="1"/>
      <circle cx="-90" cy="-70" r="610"
              fill="none" stroke="rgba(31,166,186,0.042)" stroke-width="1"/>
      <!-- Bottom-right quadrant arcs -->
      <circle cx="1290" cy="870" r="480"
              fill="none" stroke="rgba(31,166,186,0.065)" stroke-width="1"/>
      <circle cx="1290" cy="870" r="680"
              fill="none" stroke="rgba(31,166,186,0.032)" stroke-width="1"/>
      <!-- Horizontal rule -->
      <line x1="0"    y1="195" x2="1200" y2="195"
            stroke="rgba(31,166,186,0.038)" stroke-width="1"/>
      <!-- Vertical rule -->
      <line x1="210"  y1="0"   x2="210"  y2="800"
            stroke="rgba(31,166,186,0.038)" stroke-width="1"/>
      <!-- Small tick marks (blueprint registration) -->
      <line x1="205"  y1="190" x2="215"  y2="190"
            stroke="rgba(31,166,186,0.22)" stroke-width="1"/>
      <line x1="210"  y1="185" x2="210"  y2="205"
            stroke="rgba(31,166,186,0.22)" stroke-width="1"/>
    </svg>

    <!-- Card -->
    <main class="card" role="main">
      <div class="card-inner">

        <!-- Wordmark -->
        <span class="wordmark">Darquis</span>

        <!-- Rule -->
        <span class="rule" aria-hidden="true"></span>

        <!-- Heading -->
        <h1>Acceso no disponible</h1>

        <!-- Body -->
        <p class="body">
          Darquis está en fase privada de revisión.<br />
          Si necesitas acceder, contacta con el equipo.
        </p>

        <!-- Micro -->
        <p class="micro">Gracias por tu comprensión.</p>

      </div>
    </main>

  </body>
</html>
